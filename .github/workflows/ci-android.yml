name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK
        run: sdkmanager "ndk;30.0.14904198"

      # ==================== 关键修复 ====================
      - name: Create local.properties (Debug friendly)
        run: |
          cat <<EOF > android/local.properties
          sdk.dir=/usr/local/lib/android/sdk
          RELEASE_STORE_FILE=/home/runner/.android/debug.keystore
          RELEASE_STORE_PASSWORD=android
          RELEASE_KEY_ALIAS=androiddebugkey
          RELEASE_KEY_PASSWORD=android
          EOF

      - name: Create Android Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Clean Project
        run: ./gradlew clean
        working-directory: android

      - name: Build Normal Debug APK
        run: ./gradlew :app:assembleNormalDebug --stacktrace
        working-directory: android

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: android/app/build/outputs/apk/normal/debug/*.apk
          if-no-files-found: error
